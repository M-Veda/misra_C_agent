name: Clang Worker CI

on:
  push:
    branches: [main, develop]
    paths:
      - "clang-worker/**"
      - "shared/contracts/**"
      - "infrastructure/docker/clang-worker.Dockerfile"
      - ".github/workflows/ci-clang-toolchain.yml"
  pull_request:
    paths:
      - "clang-worker/**"
      - "shared/contracts/**"

jobs:
  clang-worker:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config \
            protobuf-compiler protobuf-compiler-grpc \
            libprotobuf-dev libgrpc++-dev libgrpc-dev \
            clang-18 llvm-18-dev libclang-18-dev libclang-cpp18-dev

      - name: Build
        working-directory: clang-worker
        run: |
          cmake -DCMAKE_BUILD_TYPE=Release -B build -S .
          cmake --build build --parallel $(nproc)

      - name: Health check
        working-directory: clang-worker
        run: |
          ./build/misra_clang_worker --address 127.0.0.1:50051 &
          SERVER_PID=$!
          sleep 2
          ./build/misra_clang_worker --health-check --address 127.0.0.1:50051
          kill $SERVER_PID

      - name: Docker build
        run: docker build -f infrastructure/docker/clang-worker.Dockerfile -t misra-clang-worker:ci .
