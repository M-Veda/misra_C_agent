apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: misra-platform
  namespace: misra-platform
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
spec:
  ingressClassName: nginx
  rules:
    - host: misra.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: misra-backend
                port:
                  number: 8000
          - path: /metrics
            pathType: Exact
            backend:
              service:
                name: misra-backend
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: misra-frontend
                port:
                  number: 80
