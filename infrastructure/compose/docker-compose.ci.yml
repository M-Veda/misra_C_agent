name: misra-platform-ci

services:
  postgres:
    tmpfs:
      - /var/lib/postgresql/data
    ports: []

  redis:
    ports: []

  clang-worker:
    ports: []

  backend:
    build:
      target: production
    environment:
      MISRA_ENVIRONMENT: ci
      MISRA_DATABASE_URL: postgresql+asyncpg://misra:misra_ci_password@postgres:5432/misra_platform
      MISRA_REDIS_URL: redis://redis:6379/0
      MISRA_CLANG_WORKER_HOST: clang-worker
      MISRA_CLANG_WORKER_PORT: "50051"
      MISRA_CORS_ORIGINS: http://localhost
      MISRA_LOG_LEVEL: WARNING
    volumes: []
    command: ["uvicorn", "misra_platform.main:app", "--host", "0.0.0.0", "--port", "8000"]

  frontend:
    build:
      target: production
    volumes: []
    ports: []

  nginx:
    ports: []
