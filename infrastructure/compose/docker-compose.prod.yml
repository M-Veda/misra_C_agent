name: misra-platform-prod

services:
  postgres:
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

  redis:
    restart: unless-stopped
    command: redis-server --appendonly yes --save 60 1

  clang-worker:
    restart: unless-stopped
    build:
      target: production

  backend:
    restart: unless-stopped
    build:
      target: production
    environment:
      MISRA_ENVIRONMENT: production
      MISRA_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      MISRA_REDIS_URL: redis://redis:6379/0
      MISRA_CLANG_WORKER_HOST: clang-worker
      MISRA_CLANG_WORKER_PORT: "50051"
      MISRA_CORS_ORIGINS: ${MISRA_CORS_ORIGINS}
      MISRA_LOG_LEVEL: ${MISRA_LOG_LEVEL:-INFO}
    volumes: []
    command: ["uvicorn", "misra_platform.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "4"]

  frontend:
    restart: unless-stopped
    build:
      target: production
    volumes: []
    ports: []

  nginx:
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"
      - "${NGINX_SSL_PORT:-443}:443"
